name: LaunchTVPro — Build & Release

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*'           # ex: v1.0.0 → déclenche un Release
  pull_request:
    branches:
      - main
  workflow_dispatch:       # Déclenchement manuel depuis GitHub UI

# ── Permissions ──────────────────────────────────────────────────────────────
permissions:
  contents: write          # Nécessaire pour créer des GitHub Releases
  actions: read

# ── Variables globales ───────────────────────────────────────────────────────
env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  GRADLE_VERSION: '8.2'

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint & Validation
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: Lint Android
        run: ./gradlew lint --stacktrace

      - name: Upload rapport Lint
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html
          retention-days: 7


  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build Debug APK (tous les push/PR)
  # ────────────────────────────────────────────────────────────────────────────
  build-debug:
    name: 🔨 Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Récupérer infos version
        id: version
        run: |
          VERSION_NAME=$(./gradlew -q printVersionName 2>/dev/null || grep "versionName" app/build.gradle | awk '{print $2}' | tr -d '"')
          VERSION_CODE=$(grep "versionCode" app/build.gradle | awk '{print $2}')
          COMMIT_SHA=${GITHUB_SHA::7}
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "commit_sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT
          echo "apk_name=LaunchTVPro-debug-${VERSION_NAME}-${COMMIT_SHA}.apk" >> $GITHUB_OUTPUT

      - name: Renommer l'APK debug
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}

      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: LaunchTVPro-Debug-${{ steps.version.outputs.commit_sha }}
          path: app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}
          retention-days: 14


  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build Release APK signé (push sur main ou tag v*)
  # ────────────────────────────────────────────────────────────────────────────
  build-release:
    name: 🚀 Build Release APK (Signé)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lint
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      # ── Signature APK ──────────────────────────────────────────────────────
      # Secrets requis dans GitHub → Settings → Secrets and variables → Actions :
      #   KEYSTORE_BASE64   : keystore encodé en base64
      #   KEYSTORE_PASSWORD : mot de passe du keystore
      #   KEY_ALIAS         : alias de la clé
      #   KEY_PASSWORD      : mot de passe de la clé
      - name: Décoder le Keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          echo "KEYSTORE_PATH=${{ github.workspace }}/keystore.jks" >> $GITHUB_ENV

      - name: Build Release APK (signé)
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ env.KEYSTORE_PATH }} \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --stacktrace

      - name: Build Release APK (non signé — pas de keystore)
        if: env.KEYSTORE_BASE64 == ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Récupérer infos version
        id: version
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle | awk '{print $2}' | tr -d '"')
          VERSION_CODE=$(grep "versionCode" app/build.gradle | awk '{print $2}')
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "apk_name=LaunchTVPro-release-${VERSION_NAME}.apk" >> $GITHUB_OUTPUT

      - name: Renommer l'APK release
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          mv "$APK_PATH" app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}

      - name: Upload APK Release
        uses: actions/upload-artifact@v4
        with:
          name: LaunchTVPro-Release-${{ steps.version.outputs.version_name }}
          path: app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}
          retention-days: 30

      # ── Nettoyer le keystore ───────────────────────────────────────────────
      - name: Supprimer le keystore local
        if: always()
        run: rm -f keystore.jks


  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4 — GitHub Release automatique (tag v*.*.* uniquement)
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: 📦 GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-debug, build-release]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extraire le tag version
        id: tag
        run: echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Télécharger APK Release
        uses: actions/download-artifact@v4
        with:
          pattern: LaunchTVPro-Release-*
          merge-multiple: true
          path: release-artifacts/

      - name: Télécharger APK Debug
        uses: actions/download-artifact@v4
        with:
          pattern: LaunchTVPro-Debug-*
          merge-multiple: true
          path: debug-artifacts/

      - name: Générer les Release Notes depuis les commits
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Créer la GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: "LaunchTVPro ${{ steps.tag.outputs.tag_name }}"
          body: |
            ## 📺 LaunchTVPro ${{ steps.tag.outputs.tag_name }}

            Navigateur web Android TV avec navigation D-pad spatiale.

            ### 📥 Installation
            1. Télécharger `LaunchTVPro-release-*.apk`
            2. Activer **Sources inconnues** sur votre Android TV
            3. Installer via clé USB ou ADB :
               ```bash
               adb install LaunchTVPro-release-*.apk
               ```

            ### 🎮 Télécommande
            | Touche | Action |
            |--------|--------|
            | ↑ ↓ ← → | Navigation D-pad |
            | OK | Cliquer / Activer |
            | BACK | Page précédente |
            | MENU | Toolbar ON/OFF |
            | 🔴 | Recharger |
            | 🟡 | Barre URL |
            | 🔵 | Accueil |

            ### 📝 Changements
            ${{ steps.changelog.outputs.changelog }}

            ---
            *Build automatique — ${{ github.sha }}*
          files: |
            release-artifacts/*.apk
            debug-artifacts/*.apk
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag_name, '-beta') || contains(steps.tag.outputs.tag_name, '-alpha') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
